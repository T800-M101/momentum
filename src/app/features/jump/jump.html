<div class="jump-wrapper">

  <div class="jump-heading">
    <h2 class="jump-title">Jump to a specific date</h2>
    <p class="jump-subtitle">Rediscover your memories by picking a day from your past</p>
  </div>

  <div class="jump-controls-grid">

    <div class="control-group">
      <label class="section-label">Select Date</label>
      <div class="input-container">
        <app-date-picker />
      </div>
    </div>
    <h2 class="jump-title">Or</h2>
    <div class="control-group">
      <label class="section-label">Search by Tags or Keywords and Press Enter</label>
      <div class="input-container">
        <app-custom-input placeholder="Example: #travel, happy..." [icon]="icons.Search"
          (keyup.enter)="handleSearch($event)" />
      </div>
    </div>
  </div>
</div>
