<div class="journal">

  @if(!open()) {
  <div class="cover" [class.turning]="turning()" [class.falling]="authService.closing()">

    <div class="cover-header">
      <span class="cover-title">My Journal</span>
      <div class="cover-divider"></div>
    </div>

    <div class="padlock">
      <div class="lock-shackle" [class.lock-shackle--open]="unlocking()"></div>
      <div class="lock-body">
        <div class="lock-keyhole"></div>
      </div>
    </div>

    <div class="login-box" [class.shake]="isShaking()" [formGroup]="authForm" autocomplete="off">

      @if(mode() === 'signup') {
      <input
        type="email"
        placeholder="Email"
        formControlName="email"
        autocomplete="off"
        (keydown)="onKeydown($event)" />
      }

      <input
        type="text"
        placeholder="Username / email"
        formControlName="username"
        autocomplete="off"
        (keydown)="onKeydown($event)" />

      <div class="password-wrapper">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="Password"
          formControlName="password"
          autocomplete="new-password"
          (keydown)="onKeydown($event)" />

        <button
          type="button"
          class="eye-btn"
          (click)="togglePasswordVisibility()">
          <lucide-icon
            [img]="showPassword() ? icons.EyeOff : icons.Eye"
            class="h-4 w-4"
            [style.color]="'var(--journal-gold)'">
          </lucide-icon>
        </button>
      </div>

      @if(mode() === 'signup') {
      <div class="password-wrapper">
        <input
          [type]="showConfirmPassword() ? 'text' : 'password'"
          placeholder="Confirm Password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          (keydown)="onKeydown($event)" />

        <button
          type="button"
          class="eye-btn"
          (click)="toggleConfirmPasswordVisibility()">
          <lucide-icon
            [img]="showConfirmPassword() ? icons.EyeOff : icons.Eye"
            class="h-4 w-4" [style.color]="'var(--journal-gold)'">
          </lucide-icon>
        </button>
      </div>
      }

      <button (click)="submit()">
        {{ mode() === 'login' ? 'Unlock' : 'Create Account' }}
      </button>

      <span class="auth-link" type="button" (click)="toggleMode()">
        @if(mode() === 'login') {
        New here? <span>Sign up</span>
        } @else {
        Already have an account? <span>Sign in</span>
        }
      </span>

      @if(error()) {
      <p class="error">{{ error() }}</p>
      }
    </div>

  </div>
  }

  <!-- INNER PAGE -->
  <div class="app-page" [class.visible]="open()" [class.falling]="authService.closing()">
    <span class="app-page-title">My Journal</span>
    <div class="app-page-lines">
      @for (line of [90, 70, 85, 60, 75]; track $index) {
      <div class="app-page-line"></div>
      <div class="app-page-entry" [style.width.%]="line"></div>
      }
      <div class="app-page-line"></div>
    </div>
  </div>

</div>
