<div class="journal">

  <!-- COVER -->
  @if(!open()) {
    <div class="cover"
         [class.turning]="turning()"
         [class.falling]="authService.closing()">

      <div class="cover-header">
        <span class="cover-title">My Journal</span>
        <div class="cover-divider"></div>
      </div>

      <div class="padlock">
        <div class="lock-shackle" [class.lock-shackle--open]="unlocking()"></div>
        <div class="lock-body">
          <div class="lock-keyhole"></div>
        </div>
      </div>

      <div class="login-box" [class.shake]="isShaking()">

        @if(mode() === 'signup') {
          <input
            type="email"
            placeholder="Email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            (keydown)="onKeydown($event)"
          />
        }

        <input
          type="text"
          placeholder="Username"
          [value]="username()"
          (input)="username.set($any($event.target).value)"
          (keydown)="onKeydown($event)"
        />

        <input
          type="password"
          placeholder="Password"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          (keydown)="onKeydown($event)"
        />

        @if(mode() === 'signup') {
          <input
            type="password"
            placeholder="Confirm Password"
            [value]="confirmPassword()"
            (input)="confirmPassword.set($any($event.target).value)"
            (keydown)="onKeydown($event)"
          />
        }

        <button (click)="submit()">
          {{ mode() === 'login' ? 'Unlock' : 'Create Account' }}
        </button>

        <span
          class="auth-link"
          type="button"
          (click)="toggleMode()">

          @if(mode() === 'login') {
            New here? <span>Sign up</span>
          } @else {
            Already have an account? <span>Sign in</span>
          }

        </span>

        @if(error()) {
          <p class="error">{{ error() }}</p>
        }
      </div>

    </div>
  }

  <!-- INNER PAGE -->
  <div class="app-page"
       [class.visible]="open()"
       [class.falling]="authService.closing()">

    <span class="app-page-title">My Journal</span>

    <div class="app-page-lines">
      @for (line of [90, 70, 85, 60, 75]; track $index) {
        <div class="app-page-line"></div>
        <div class="app-page-entry" [style.width.%]="line"></div>
      }
      <div class="app-page-line"></div>
    </div>

  </div>

</div>
