<div class="flex h-screen bg-[#FDFCFB] overflow-hidden">

  <app-sidebar></app-sidebar>

  <main class="flex-1 flex flex-col relative h-full">

    <app-topbar />

    <div class="flex-1 overflow-y-auto px-6 md:px-10 pb-32 md:pb-10 custom-scrollbar">
      <div class="mb-12">
        <h3 class="month-label">Jan 2023</h3>
        <div class="grid gap-5">
          @for (day of [30, 25, 21, 20]; track day) {
          <app-journal-card [day]="day" dayName="Mon" title="Lorem ipsum dolor sit amet" time="10:30 PM"
            content="Lorem ipsum dolor sit amet, consectetur adipiscing elit...">
          </app-journal-card>
          } @empty {
          <div class="text-center py-10 text-gray-400">
            <p>No entries for this month.</p>
          </div>
          }
        </div>
      </div>
    </div>

    <app-mobile-nav />
    
  </main>
</div>
