<aside class="sidebar-container">

  <!-- LOGO -->
  <div class="sidebar-logo-section">
    <div class="logo-box">
      <lucide-icon [img]="icons().NotebookPen" class="h-5 w-5"></lucide-icon>
    </div>
    <span class="sidebar-title">Journal</span>
  </div>

  <!-- NAVIGATION -->
  <nav class="nav-menu">

    <a class="nav-item" routerLink="/entries" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">

      <lucide-icon [img]="icons().NotebookTabs" class="h-5 w-5"></lucide-icon>
      <span>Entries</span>
    </a>

    <a class="nav-item" routerLink="/jump" routerLinkActive="active">

      <lucide-icon [img]="icons().CalendarDays" class="h-5 w-5"></lucide-icon>
      <span>Jump</span>
    </a>

    <a class="nav-item" routerLink="/settings" routerLinkActive="active">

      <lucide-icon [img]="icons().Settings" class="h-5 w-5"></lucide-icon>
      <span>Settings</span>
    </a>

    <a class="nav-item" routerLink="/new" routerLinkActive="active">

      <lucide-icon [img]="icons().SquarePen" class="h-5 w-5"> </lucide-icon>
      <span>New</span>
    </a>

  </nav>

  <!-- FOOTER -->
  <div class="footer-section">

    @if (isMenuOpen()) {
    <div class="profile-popover" (click)="$event.stopPropagation()">
      <div class="popover-header flex gap-4">
        <div class="flex flex-col">
          <span class="text-xs font-bold text-gray-800">124</span>
          <span class="text-[9px] uppercase tracking-tighter text-gray-400">Entries</span>
        </div>
        <div class="flex flex-col border-l pl-4 border-gray-100">
          <span class="text-xs font-bold text-gray-800">12 Days</span>
          <span class="text-[9px] uppercase tracking-tighter text-gray-400">Streak</span>
        </div>
      </div>
      <button class="popover-item logout" (click)="onLogout()">
        <lucide-icon [img]="icons().LogOut" class="h-4 w-4"></lucide-icon>
        <span>Log Out</span>
      </button>
    </div>
    }

    <div class="profile-card" [class.active]="isMenuOpen()" (click)="toggleMenu($event)">
      <div class="avatar">G</div>
      <div class="profile-info">
        <span class="profile-name">Guillermo Moran</span>
        <span class="profile-email">memo@example.com</span>
      </div>
      <lucide-icon [img]="icons().Settings" class="h-4 w-4 text-gray-400 transition-transform"
        [class.rotate-180]="isMenuOpen()">
      </lucide-icon>
    </div>

  </div>
</aside>
