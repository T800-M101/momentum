<div class="entry-reader">

  <header class="reader-header">

    <button class="edit-btn">
      Edit
    </button>

  </header>

  <section class="reader-meta">
    <div class="reader-date">
      Saturday, January 16
    </div>

    <div class="reader-mood">
      💪 Feeling Strong
    </div>
  </section>

  <h1 class="reader-title">
    Mañana de caminata por Chipinque
  </h1>

  <section class="reader-gallery">
    <!-- images -->
  </section>

  <article
    class="reader-content"
    [innerHTML]="entry().content">
  </article>

  <footer class="reader-tags">
    #gym #mountains #weekend
  </footer>

</div>
