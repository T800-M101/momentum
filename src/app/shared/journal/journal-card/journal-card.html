<div class="journal-card-container group" (click)="openEntry()">

  <div class="date-column">
    <span class="day-number">{{ dateDetails().day }}</span>
    <span class="day-name">{{ dateDetails().dayName}}</span>

    <div class="mood-emoji-container">{{ entry().mood.emoji }}</div>
  </div>

  <div class="content-area">
    <div class="card-header">
      <h4 class="card-title">{{ entry().title }}</h4>

      @if(showMediaCount()){
        <div class="card-meta">
          @if(mediaCount()) {
          <div class="media-indicator">
            <lucide-icon [img]="icons.Images" class="h-3.5 w-3.5"> </lucide-icon>
            <span>{{mediaCount() }}</span>
          </div>
          }
          <span class="card-time">{{ dateDetails().time }}</span>
        </div>
      }
    </div>

    <div class="text-fade-container">
      <p class="card-body">
        {{ entry().content }}
      </p>
    </div>

    <div class="options-wrapper">

      <button class="options-button" (click)="$event.stopPropagation(); toggleMenu($event)">
        <lucide-icon [img]="icons.EllipsisVertical" class="h-5 w-4"></lucide-icon>
      </button>

      @if(showMenu()) {
      <div class="entry-menu" (click)="$event.stopPropagation()">

        @if(showMediaCount()){
          <button class="menu-item add" (click)="$event.stopPropagation()">
            <lucide-icon [img]="icons.ImagePlus" class="h-4 w-4"></lucide-icon>
            <span>Add photos</span>
          </button>
        }

        <button class="menu-item edit" (click)="$event.stopPropagation(); editEntry($event)">
          <lucide-icon [img]="icons.Pencil" class="h-4 w-4"></lucide-icon>
          <span>Edit entry</span>
        </button>

        <button class="menu-item remove" (click)="$event.stopPropagation(); removeEntry($event)">
          <lucide-icon [img]="icons.Trash2" class="h-4 w-4"></lucide-icon>
          <span>Remove</span>
        </button>

      </div>
      }

    </div>
  </div>
</div>

@if (showDeleteModal()) {
  <app-modal
    title="Delete Entry"
    body="Are you sure you want to delete this entry? This action is permanent and cannot be undone."
    btnCancelText="Cancel"
    btnConfirmText="Delete permanently"
    mode="danger"
    (onDecision)="handleDeleteDecision($event)" />
}
