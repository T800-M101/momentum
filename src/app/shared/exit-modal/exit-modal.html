<div class="modal-overlay">
    <div class="modal-card animate-fade-in">

      <div class="modal-header">
        <span class="modal-icon">⚠️</span>
        <h3 class="modal-title">Unsaved changes</h3>
      </div>

      <p class="modal-body">
       You have a journal entry in progress. If you exit now, you will lose all the content you have written. Do you want to discard the changes?
      </p>

      <div class="modal-actions">
        <button type="button" class="btn-keep" (click)="makeDecision(false)">
         Keep writing
        </button>
        <button type="button" class="btn-discard" (click)="makeDecision(true)">
          Discard and exit
        </button>
      </div>

    </div>
  </div>
